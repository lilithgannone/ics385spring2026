<!DOCTYPE html>
<html>
<head>
<title>Kahului Weather</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="card">

<!-- Found in W3 Schools "JavaScript Date toLocaleString()" tutorial -->
<h1>Current Weather in Kahului as of <span id="datetime"></span></h1>

<script>
const d = new Date();
let text = d.toLocaleString();
document.getElementById("datetime").innerHTML = text;
</script>

<!-- Got stuck, so I did some research and went over W3 Schools' "HTML <span> Tag" tutorial. I needed a bit of guidance on how to handle the span and ID tags. Researched online and ended up brainstorming just a bit with AI, as I couldn't find information on how to implement with separate HTML and JS files on W3 Schools. I did write the code myself.-->
<img id="imgicon" alt="Weather Icon">
<p>Icon Code: <span id="icon"></span></p>
<p>Description: <span id="description"></span></p>
<p>Temperature: <span id="temperature"></span></p>
<p>Humidity: <span id="humidity"></span></p>
<p>Wind Speed: <span id="wind-speed"></span></p>
<p>Cloudiness: <span id="cloudiness"></span></p>

<!-- W3 Schools "HTML <script> src Attribute" tutorial -->
<script src="dashboard.js"></script>

</div>
</body>

</html>
